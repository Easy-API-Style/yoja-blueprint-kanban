<section id="taskdetail-section"
         yw-controler="./TaskDetailControler.js"
         yw-css="./taskdetail.css"
         yw-language="./taskdetail.xml">
    <div class="detail-header">
        <button class="btn-back" yw-i18n="detail.back"></button>
        <span class="detail-title"></span>
    </div>
    <div class="detail-body">
        <div class="detail-row">
            <span class="detail-label" yw-i18n="detail.status"></span>
            <span class="detail-status"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label" yw-i18n="detail.assignee"></span>
            <span class="detail-assignee"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label" yw-i18n="detail.id"></span>
            <span class="detail-id"></span>
        </div>
    </div>
</section>
